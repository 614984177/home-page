<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张松超 - 个人导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .description {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: block;
            text-decoration: none;
            color: #fff;
            background-color: #34495e;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .link-item:hover {
            background-color: #2c3e50;
            box-shadow: 0 4px 15px rgba(52, 73, 94, 0.3);
        }

        .link-item.blog {
            background-color: #3498db;
        }

        .link-item.blog:hover {
            background-color: #2980b9;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .link-item.github {
            background-color: #24292e;
        }

        .link-item.github:hover {
            background-color: #1b1f23;
            box-shadow: 0 4px 15px rgba(36, 41, 46, 0.3);
        }

        .contact-info {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .contact-info p {
            margin: 5px 0;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #bdc3c7;
            line-height: 1.8;
        }

        .footer a:hover {
            color: #95a5a6 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头像图片，如果有自己的图片链接可以替换 src -->
        <div class="avatar">
            <img src="https://github.com/614984177.png" alt="张松超的头像">
        </div>
        
        <h1 class="name">张松超 (Songchao Zhang)</h1>
        <p class="description">Stay hungry, stay foolish.</p>
        
        <div class="links">
            <a href="https://blog.zhangsongchao.cn" class="link-item blog" target="_blank">Blog / 个人博客</a>
            <a href="https://github.com/614984177" class="link-item github" target="_blank">GitHub</a>
            <!-- 你可以随时添加更多链接，例如： -->
            <!-- <a href="mailto:your_email@example.com" class="link-item">Email / 联系我</a> -->
        </div>

        <div class="contact-info">
            <p>QQ: 614984177</p>
            <p>WeChat: ZSC614984177</p>
        </div>

        <div class="footer">
            <p>&copy; 2026 张松超. All Rights Reserved.</p>
            <p><a href="https://beian.miit.gov.cn/" target="_blank" style="color: #bdc3c7; text-decoration: none;">豫ICP备2026012479号-1</a></p>
        </div>
    </div>
</body>
</html>
